<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeoBank Churn & LTV Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f14;
      --surface:  #161a23;
      --card:     #1e2330;
      --border:   #2a3045;
      --accent:   #00d4aa;
      --accent2:  #4f7fff;
      --text:     #e8eaf0;
      --muted:    #7a8299;
      --code-bg:  #0a0c10;
      --radius:   12px;
      --font:     'Inter', -apple-system, sans-serif;
      --mono:     'JetBrains Mono', monospace;
    }

    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Layout ────────────────────────────────────────── */
    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── Sidebar ───────────────────────────────────────── */
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 300;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      display: flex;
      flex-direction: column;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 16px 14px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-title {
      font-size: 13px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted);
    }
    .close-btn {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 14px; padding: 4px;
    }
    .close-btn:hover { color: var(--text); }
    .sidebar-topics { padding: 8px; overflow-y: auto; flex: 1; }
    .sidebar-topic-btn {
      display: block; width: 100%; text-align: left;
      background: none; border: none;
      color: var(--text); padding: 10px 12px;
      border-radius: 8px; cursor: pointer;
      font-size: 13px; line-height: 1.4;
      transition: background 0.15s;
      font-family: var(--font);
    }
    .sidebar-topic-btn:hover { background: var(--card); color: var(--accent); }

    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200; display: none;
    }
    .overlay.visible { display: block; }

    /* ─── Header ────────────────────────────────────────── */
    .header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .menu-btn {
      display: flex; flex-direction: column; gap: 4px;
      background: none; border: none; cursor: pointer; padding: 4px;
    }
    .menu-btn span {
      display: block; width: 18px; height: 2px;
      background: var(--muted); border-radius: 1px;
      transition: background 0.15s;
    }
    .menu-btn:hover span { background: var(--text); }
    .header-brand { display: flex; align-items: center; gap: 8px; flex: 1; }
    .logo-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      flex-shrink: 0;
    }
    .brand-name { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
    .header-badge {
      font-size: 11px; color: var(--muted);
      background: var(--card); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 20px;
      letter-spacing: 0.05em; white-space: nowrap;
    }

    /* ─── Chat Area ─────────────────────────────────────── */
    .chat-area {
      flex: 1; overflow-y: auto;
      padding: 20px;
      display: flex; flex-direction: column; gap: 20px;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ─── Messages ──────────────────────────────────────── */
    .message { display: flex; gap: 12px; max-width: 820px; width: 100%; }
    .user-message { margin-left: auto; flex-direction: row-reverse; }
    .bot-message  { margin-right: auto; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
      color: #0d0f14;
    }
    .bubble { padding: 14px 16px; border-radius: var(--radius); line-height: 1.65; max-width: 100%; }
    .user-bubble {
      background: linear-gradient(135deg, var(--accent2), #3d6bff);
      color: #fff; border-bottom-right-radius: 4px; font-size: 14px;
    }
    .bot-bubble {
      background: var(--card); border: 1px solid var(--border);
      border-bottom-left-radius: 4px; flex: 1;
    }

    /* Loading dots */
    .loading-bubble { display: flex; gap: 6px; align-items: center; padding: 16px 20px; }
    .dot {
      width: 7px; height: 7px; background: var(--accent);
      border-radius: 50%; animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40%            { transform: scale(1);   opacity: 1; }
    }

    /* ─── Response Content ──────────────────────────────── */
    .response-title {
      font-size: 16px; font-weight: 700;
      color: var(--accent); margin-bottom: 12px; letter-spacing: -0.01em;
    }
    .response-body p { margin-bottom: 4px; font-size: 13.5px; }
    .response-body .spacer { height: 8px; }
    .section-heading {
      font-size: 13px; font-weight: 600; color: var(--accent2);
      margin: 10px 0 4px;
    }
    .response-list { padding-left: 16px; margin: 4px 0 8px; }
    .response-list li { margin-bottom: 3px; font-size: 13.5px; }

    .code-block {
      background: var(--code-bg); border: 1px solid var(--border);
      border-left: 3px solid var(--accent); border-radius: 6px;
      padding: 12px 14px; margin: 8px 0; overflow-x: auto;
      font-family: var(--mono); font-size: 12.5px; line-height: 1.6;
      color: #a8d8c2; white-space: pre;
    }
    .inline-code {
      font-family: var(--mono); font-size: 12px;
      background: var(--code-bg); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 5px; color: var(--accent);
    }

    .table-wrap { overflow-x: auto; margin: 8px 0; }
    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    th, td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
    th {
      background: rgba(0,212,170,0.08); color: var(--accent);
      font-weight: 600; font-size: 12px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

    .tag-row {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 12px; padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .tag {
      font-size: 11px; padding: 2px 8px;
      border-radius: 20px; border: 1px solid var(--border);
      color: var(--muted); letter-spacing: 0.04em;
    }

    /* ─── Chips Bar ─────────────────────────────────────── */
    .chips-bar {
      display: flex; gap: 8px; padding: 10px 20px;
      overflow-x: auto; flex-shrink: 0;
      border-top: 1px solid var(--border);
    }
    .chips-bar::-webkit-scrollbar { display: none; }
    .topic-chip {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 6px 14px;
      border-radius: 20px; cursor: pointer;
      font-size: 12px; white-space: nowrap;
      transition: all 0.15s; font-family: var(--font);
    }
    .topic-chip:hover {
      border-color: var(--accent); color: var(--accent);
      background: rgba(0,212,170,0.06);
    }

    /* ─── Starter Prompts ───────────────────────────────── */
    .starters {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 0 20px 12px;
    }
    .starter-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); padding: 7px 14px;
      border-radius: var(--radius); cursor: pointer;
      font-size: 12.5px; font-family: var(--font);
      transition: all 0.15s;
    }
    .starter-btn:hover {
      border-color: var(--accent2); color: var(--text);
      background: rgba(79,127,255,0.06);
    }

    /* ─── Input Bar ─────────────────────────────────────── */
    .input-bar {
      display: flex; gap: 10px;
      padding: 14px 20px 18px;
      border-top: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
      align-items: flex-end;
    }
    .chat-input {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: var(--font); font-size: 14px;
      padding: 11px 14px; resize: none; outline: none;
      line-height: 1.5; transition: border-color 0.15s;
      max-height: 120px; overflow-y: auto;
    }
    .chat-input:focus { border-color: var(--accent); }
    .chat-input::placeholder { color: var(--muted); }
    .send-btn {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--accent); border: none;
      color: #0d0f14; font-size: 18px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all 0.15s; flex-shrink: 0;
    }
    .send-btn:hover:not(:disabled) { background: #00ffe6; transform: translateY(-1px); }
    .send-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

    /* ─── Responsive ────────────────────────────────────── */
    @media (max-width: 600px) {
      .header-badge { display: none; }
      .chat-area { padding: 14px; }
      .chips-bar { padding: 8px 14px; }
      .input-bar { padding: 10px 14px 16px; }
      .starters { padding: 0 14px 10px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Topics</span>
      <button class="close-btn" onclick="closeSidebar()">✕</button>
    </div>
    <div class="sidebar-topics" id="sidebarTopics"></div>
  </aside>
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- Main -->
  <div class="main">

    <!-- Header -->
    <header class="header">
      <button class="menu-btn" onclick="openSidebar()">
        <span></span><span></span><span></span>
      </button>
      <div class="header-brand">
        <div class="logo-dot"></div>
        <span class="brand-name">NeoBank Intelligence</span>
      </div>
      <div class="header-badge">Churn · LTV · Retention</div>
    </header>

    <!-- Chat -->
    <div class="chat-area" id="chatArea"></div>

    <!-- Chips bar -->
    <div class="chips-bar" id="chipsBar"></div>

    <!-- Starters -->
    <div class="starters" id="starters"></div>

    <!-- Input -->
    <div class="input-bar">
      <textarea
        id="chatInput"
        class="chat-input"
        rows="1"
        placeholder="Ask about churn signals, LTV formulas, ML models…"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>

  </div>
</div>

<script>
  const API_BASE = 'http://127.0.0.1:5000';
  let isLoading = false;
  let msgCounter = 0;
  let startersShown = true;

  const STARTERS = [
    "What is customer churn?",
    "How do I calculate LTV?",
    "Which ML models work best?",
    "How does churn impact revenue?"
  ];

  const TAG_COLORS = {
    churn: '#e74c3c22', ltv: '#2ecc7122', ml: '#3498db22',
    revenue: '#f39c1222', metrics: '#9b59b622', features: '#1abc9c22',
    data: '#34495e22', strategy: '#e67e2222', retention: '#27ae6022',
  };

  // ── Init ──────────────────────────────────────────────────────
  window.onload = async () => {
    appendBotMessage({
      title: 'NeoBank Churn & LTV Intelligence',
      body: "Welcome! I'm your specialist guide for **customer churn and lifetime value (LTV) prediction** in neobanks.\n\nSelect a topic below or ask me anything — from model selection to retention tactics.",
      tags: []
    });
    renderStarters();
    await loadTopics();
  };

  // ── Topics ────────────────────────────────────────────────────
  async function loadTopics() {
    try {
      const res = await fetch(`${API_BASE}/api/topics`);
      const data = await res.json();
      const topics = data.topics || [];
      renderChips(topics);
      renderSidebar(topics);
    } catch { /* server not available */ }
  }

  function renderChips(topics) {
    const bar = document.getElementById('chipsBar');
    bar.innerHTML = '';
    topics.slice(0, 6).forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'topic-chip';
      btn.textContent = t.label;
      btn.onclick = () => sendTopic(t.id);
      bar.appendChild(btn);
    });
  }

  function renderSidebar(topics) {
    const container = document.getElementById('sidebarTopics');
    container.innerHTML = '';
    topics.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'sidebar-topic-btn';
      btn.textContent = t.label;
      btn.onclick = () => { closeSidebar(); sendTopic(t.id); };
      container.appendChild(btn);
    });
  }

  function renderStarters() {
    const el = document.getElementById('starters');
    STARTERS.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'starter-btn';
      btn.textContent = s;
      btn.onclick = () => sendUserMessage(s);
      el.appendChild(btn);
    });
  }

  // ── Sidebar ───────────────────────────────────────────────────
  function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('visible'); }
  function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('visible'); }

  // ── Sending ───────────────────────────────────────────────────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || isLoading) return;
    input.value = '';
    input.style.height = 'auto';
    sendUserMessage(text);
  }

  function sendTopic(topicId) { sendUserMessage(topicId, true); }

  async function sendUserMessage(text, isTopicId = false) {
    if (isLoading) return;
    hideStarters();

    appendUserMessage(isTopicId ? text.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) : text);
    const loadingId = appendLoading();
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    try {
      const res = await fetch(`${API_BASE}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      removeLoading(loadingId);
      appendBotMessage({ title: data.title, body: data.body, tags: data.tags || [] });
    } catch {
      removeLoading(loadingId);
      appendBotMessage({
        title: 'Connection Error',
        body: 'Could not reach the backend server. Make sure the Python Flask server is running on **port 5000**.\n\nRun: `python app.py`',
        tags: []
      });
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('chatInput').focus();
  }

  function hideStarters() {
    if (startersShown) {
      document.getElementById('starters').style.display = 'none';
      startersShown = false;
    }
  }

  // ── Message Rendering ─────────────────────────────────────────
  function appendUserMessage(text) {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'message user-message';
    div.innerHTML = `<div class="bubble user-bubble">${escapeHtml(text)}</div>`;
    area.appendChild(div);
    scrollBottom();
  }

  function appendLoading() {
    const area = document.getElementById('chatArea');
    const id = 'load-' + (++msgCounter);
    const div = document.createElement('div');
    div.className = 'message bot-message';
    div.id = id;
    div.innerHTML = `
      <div class="avatar">N</div>
      <div class="bubble bot-bubble loading-bubble">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>`;
    area.appendChild(div);
    scrollBottom();
    return id;
  }

  function removeLoading(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function appendBotMessage({ title, body, tags }) {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'message bot-message';

    const tagsHtml = tags && tags.length
      ? `<div class="tag-row">${tags.map(t => `<span class="tag" style="background:${tagColor(t)}">${escapeHtml(t)}</span>`).join('')}</div>`
      : '';

    div.innerHTML = `
      <div class="avatar">N</div>
      <div class="bubble bot-bubble">
        ${title ? `<div class="response-title">${escapeHtml(title)}</div>` : ''}
        <div class="response-body">${renderMarkdown(body)}</div>
        ${tagsHtml}
      </div>`;
    area.appendChild(div);
    scrollBottom();
  }

  function scrollBottom() {
    const area = document.getElementById('chatArea');
    setTimeout(() => area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' }), 50);
  }

  // ── Markdown Renderer ─────────────────────────────────────────
  function renderMarkdown(text) {
    const lines = text.split('\n');
    let html = '';
    let i = 0;

    while (i < lines.length) {
      const line = lines[i];

      // Code block
      if (line.startsWith('```')) {
        const codeLines = [];
        i++;
        while (i < lines.length && !lines[i].startsWith('```')) {
          codeLines.push(lines[i]);
          i++;
        }
        html += `<pre class="code-block"><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`;
        i++; continue;
      }

      // Table
      if (line.includes('|') && line.trim().startsWith('|')) {
        const tableLines = [];
        while (i < lines.length && lines[i].includes('|') && lines[i].trim().startsWith('|')) {
          tableLines.push(lines[i]);
          i++;
        }
        const rows = tableLines.filter(l => !/^\|[-| ]+\|$/.test(l));
        html += '<div class="table-wrap"><table>';
        rows.forEach((row, ri) => {
          const cells = row.split('|').filter((_, ci, a) => ci > 0 && ci < a.length - 1);
          html += '<tr>' + cells.map(c => ri === 0
            ? `<th>${inlineMarkdown(c.trim())}</th>`
            : `<td>${inlineMarkdown(c.trim())}</td>`
          ).join('') + '</tr>';
        });
        html += '</table></div>';
        continue;
      }

      // Bullet
      if (line.startsWith('• ') || line.startsWith('* ')) {
        const items = [];
        while (i < lines.length && (lines[i].startsWith('• ') || lines[i].startsWith('* '))) {
          items.push(lines[i].replace(/^[•*] /, ''));
          i++;
        }
        html += '<ul class="response-list">' + items.map(b => `<li>${inlineMarkdown(b)}</li>`).join('') + '</ul>';
        continue;
      }

      // Bold-only heading
      if (/^\*\*[^*]+\*\*$/.test(line)) {
        html += `<h4 class="section-heading">${line.replace(/\*\*/g, '')}</h4>`;
        i++; continue;
      }

      // Empty line
      if (line.trim() === '') { html += '<div class="spacer"></div>'; i++; continue; }

      html += `<p>${inlineMarkdown(line)}</p>`;
      i++;
    }
    return html;
  }

  function inlineMarkdown(text) {
    return escapeHtml(text)
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function tagColor(label) {
    const key = Object.keys(TAG_COLORS).find(k => label.includes(k));
    return key ? TAG_COLORS[key] : '#ffffff10';
  }
</script>
</body>
</html>
